<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HisabKitab - Secure Finance Tracker</title>
    
    <!-- PWA / Mobile App Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HisabKitab">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e1f23">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"HisabKitab Finance Tracker","short_name":"HisabKitab","start_url":"./index.html","display":"standalone","background_color":"#1e1f23","theme_color":"#1e1f23","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2454/2454291.png","sizes":"192x192","type":"image/png","purpose":"any"},{"src":"https://cdn-icons-png.flaticon.com/512/2454/2454291.png","sizes":"512x512","type":"image/png","purpose":"maskable"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root {
            --bg: #1e1f23;
            --card: #1e1f23;
            --dark-shadow: 6px 6px 12px #151619;
            --light-shadow: -6px -6px 12px #27282d;
            --inset-shadow: inset 4px 4px 8px #151619, inset -4px -4px 8px #27282d;
            --accent: #6366f1;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #e2e8f0;
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: contain;
            overflow: hidden;
        }

        .neu-flat { background: var(--card); box-shadow: var(--dark-shadow), var(--light-shadow); }
        .neu-pressed { background: var(--card); box-shadow: var(--inset-shadow); }
        .neu-button { background: var(--card); box-shadow: var(--dark-shadow), var(--light-shadow); transition: all 0.2s ease; }
        .neu-button:active { box-shadow: var(--inset-shadow); transform: scale(0.95); }
        .neu-input { background: var(--card); box-shadow: var(--inset-shadow); border: none; outline: none; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        
        input[type="checkbox"] {
            appearance: none; width: 24px; height: 24px; border-radius: 6px;
            background: var(--card); box-shadow: var(--dark-shadow), var(--light-shadow);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        input[type="checkbox"]:checked { box-shadow: var(--inset-shadow); }
        input[type="checkbox"]:checked::after { content: '✓'; color: #10b981; font-weight: bold; }

        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .passcode-dot { width: 12px; height: 12px; border-radius: 50%; background: #374151; transition: all 0.2s; }
        .passcode-dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .progress-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        #categoryModal.hidden { opacity: 0; pointer-events: none; display: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Auth Screen -->
    <div id="auth-overlay" class="p-8">
        <div class="mb-12 flex flex-col items-center">
            <svg width="80" height="80" viewBox="0 0 100 100" class="mb-4">
                <rect x="5" y="5" width="90" height="90" rx="20" fill="#1e1f23" style="box-shadow: var(--dark-shadow), var(--light-shadow);" />
                <path d="M30 30 V70 M30 50 H50 M50 30 V70" stroke="#6366f1" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.8"/>
                <path d="M60 30 V70 M60 50 L75 30 M60 50 L75 70" stroke="#10b981" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.8"/>
            </svg>
            <h2 id="auth-title" class="text-2xl font-black text-white text-center">HisabKitab</h2>
            <p id="auth-desc" class="text-xs text-gray-500 font-bold uppercase tracking-widest mt-2 text-center">Enter Passcode</p>
        </div>

        <div class="flex gap-4 mb-12" id="dot-container">
            <div class="passcode-dot"></div>
            <div class="passcode-dot"></div>
            <div class="passcode-dot"></div>
            <div class="passcode-dot"></div>
        </div>

        <div class="grid grid-cols-3 gap-6 w-full max-w-xs">
            <button onclick="inputPin(1)" class="neu-button aspect-square rounded-2xl text-xl font-bold">1</button>
            <button onclick="inputPin(2)" class="neu-button aspect-square rounded-2xl text-xl font-bold">2</button>
            <button onclick="inputPin(3)" class="neu-button aspect-square rounded-2xl text-xl font-bold">3</button>
            <button onclick="inputPin(4)" class="neu-button aspect-square rounded-2xl text-xl font-bold">4</button>
            <button onclick="inputPin(5)" class="neu-button aspect-square rounded-2xl text-xl font-bold">5</button>
            <button onclick="inputPin(6)" class="neu-button aspect-square rounded-2xl text-xl font-bold">6</button>
            <button onclick="inputPin(7)" class="neu-button aspect-square rounded-2xl text-xl font-bold">7</button>
            <button onclick="inputPin(8)" class="neu-button aspect-square rounded-2xl text-xl font-bold">8</button>
            <button onclick="inputPin(9)" class="neu-button aspect-square rounded-2xl text-xl font-bold">9</button>
            <div class="aspect-square"></div>
            <button onclick="inputPin(0)" class="neu-button aspect-square rounded-2xl text-xl font-bold">0</button>
            <button onclick="clearPin()" class="neu-button aspect-square rounded-2xl text-xs font-bold text-red-400 uppercase tracking-tighter">DEL</button>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="main-app" class="hidden max-w-md mx-auto min-h-screen flex flex-col pb-24 overflow-hidden">
        <header class="p-6 pb-2 sticky top-0 bg-[#1e1f23] z-10">
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col">
                    <div class="flex items-center gap-3 mb-1">
                        <svg width="35" height="35" viewBox="0 0 100 100">
                            <rect x="5" y="5" width="90" height="90" rx="20" fill="#1e1f23" />
                            <path d="M30 30 V70 M30 50 H50 M50 30 V70" stroke="#6366f1" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.8"/>
                            <path d="M60 30 V70 M60 50 L75 30 M60 50 L75 70" stroke="#10b981" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.8"/>
                        </svg>
                        <h1 class="text-xl font-black text-gray-100 tracking-tight leading-none">HisabKitab</h1>
                    </div>
                    <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest ml-1" id="viewModeLabel">TRACK • PLAN • GROW</p>
                </div>

                <div class="flex flex-col items-end gap-2">
                    <div class="flex gap-2">
                        <button onclick="triggerImport()" class="p-2 neu-button rounded-xl text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        </button>
                        <button onclick="exportData()" class="p-2 neu-button rounded-xl text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </button>
                    </div>
                    <select id="mainSelector" onchange="handleSelectorChange()" class="neu-pressed text-gray-300 rounded-lg px-3 py-1 text-[10px] font-bold outline-none">
                    </select>
                </div>
            </div>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="handleImport(event)">
        </header>

        <main class="flex-grow p-6 pt-2 space-y-6 overflow-y-auto no-scrollbar">
            <section id="dashboard-stats" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="neu-flat p-5 rounded-3xl text-center">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">Total Saved</p>
                        <p class="text-xl font-black text-green-500" id="statSaved">₹0</p>
                    </div>
                    <div class="neu-flat p-5 rounded-3xl text-center">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">Invested (SIP)</p>
                        <p class="text-xl font-black text-indigo-400" id="statInvested">₹0</p>
                    </div>
                </div>
            </section>
            <div id="contentArea"></div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-[#1e1f23] flex justify-around items-center p-4 safe-bottom z-20">
            <button onclick="setView('dashboard')" class="nav-btn p-3 rounded-2xl neu-flat" id="btn-dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </button>
            <button onclick="setView('entry')" class="nav-btn p-3 rounded-2xl neu-flat" id="btn-entry">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
            <button onclick="setView('wishlist')" class="nav-btn p-3 rounded-2xl neu-flat" id="btn-wishlist">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            </button>
            <button onclick="setView('retirement')" class="nav-btn p-3 rounded-2xl neu-flat" id="btn-retirement">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
            </button>
        </nav>
    </div>

    <!-- Modals -->
    <div id="categoryModal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[100] flex items-center justify-center p-6 hidden">
        <div class="neu-flat w-full max-w-xs rounded-[2rem] p-8">
            <h3 class="text-lg font-black mb-6 text-gray-100">New Category</h3>
            <input type="text" id="newCategoryName" placeholder="e.g. Dining Out" class="w-full neu-pressed rounded-2xl px-5 py-4 outline-none text-white mb-8">
            <div class="flex gap-4">
                <button onclick="closeCategoryModal()" class="flex-1 py-4 text-gray-400 font-bold text-xs uppercase">Cancel</button>
                <button onclick="confirmAddCategory()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black text-xs uppercase">Add</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-3 rounded-full text-[10px] font-black shadow-2xl opacity-0 transition-opacity pointer-events-none z-[2000] uppercase tracking-widest text-center">
        Saved!
    </div>

    <script>
        // --- DATA INITIALIZATION & MIGRATION ---
        let rawStored = localStorage.getItem('finance_pro_data');
        let appData;
        
        try {
            let parsed = rawStored ? JSON.parse(rawStored) : {};
            // Migration: Ensure all keys exist to prevent crashes
            appData = {
                months: parsed.months || {},
                wishlist: parsed.wishlist || [],
                categories: parsed.categories || ["Car Loan", "Credit Card", "Office Travel", "Trip Expenses", "Survival Money", "SIP"],
                portfolioValue: parsed.portfolioValue || 0,
                retirementGoal: parsed.retirementGoal || 40000000,
                passcode: parsed.passcode || null
            };
        } catch (e) {
            // Fallback for corrupted data
            appData = {
                months: {}, wishlist: [], categories: ["Car Loan", "Credit Card", "Office Travel", "Trip Expenses", "Survival Money", "SIP"], 
                portfolioValue: 0, retirementGoal: 40000000, passcode: null
            };
        }

        // --- AUTH LOGIC ---
        let currentPinInput = "";
        function inputPin(num) {
            if (currentPinInput.length < 4) {
                currentPinInput += num;
                updatePinDots();
                if (currentPinInput.length === 4) {
                    setTimeout(validateAuth, 300);
                }
            }
        }

        function clearPin() {
            currentPinInput = "";
            updatePinDots();
        }

        function updatePinDots() {
            const dots = document.querySelectorAll('.passcode-dot');
            dots.forEach((dot, idx) => {
                if (idx < currentPinInput.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function validateAuth() {
            if (!appData.passcode) {
                // Registration Mode
                appData.passcode = btoa(currentPinInput);
                localStorage.setItem('finance_pro_data', JSON.stringify(appData));
                unlockApp();
                showToast("Passcode Set");
            } else {
                // Verification Mode
                if (btoa(currentPinInput) === appData.passcode) {
                    unlockApp();
                } else {
                    currentPinInput = "";
                    updatePinDots();
                    showToast("Wrong Passcode");
                }
            }
        }

        function unlockApp() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            document.body.style.overflow = 'auto';
            initApp();
        }

        // --- APP STATE ---
        let currentView = 'dashboard';
        let dashboardMode = 'monthly';
        let selectedMonth = new Date().toISOString().substring(0, 7);
        let selectedYear = new Date().getFullYear().toString();

        function initApp() {
            Chart.defaults.color = '#94a3b8';
            renderSelectorUI();
            updateStats();
            setView('dashboard');
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            }
        }

        window.onload = () => {
            if (!appData.passcode) {
                document.getElementById('auth-title').innerText = "Register";
                document.getElementById('auth-desc').innerText = "Set a 4-Digit Passcode";
            }
        };

        const defaultMonthData = () => ({
            income: { salary: 0, credits: 0 },
            expenses: Object.fromEntries(appData.categories.map(c => [c, 0]))
        });

        function renderSelectorUI() {
            const s = document.getElementById('mainSelector'); 
            if (!s) return;
            s.innerHTML = '';
            const now = new Date();
            if (dashboardMode === 'monthly' || currentView !== 'dashboard') {
                document.getElementById('viewModeLabel').innerText = "TRACK • PLAN • GROW";
                for (let i = -12; i <= 12; i++) {
                    const date = new Date(now.getFullYear(), now.getMonth() + i, 1);
                    const val = date.toISOString().substring(0, 7);
                    const opt = document.createElement('option'); opt.value = val; opt.text = date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                    if (val === selectedMonth) opt.selected = true; s.appendChild(opt);
                }
            } else {
                document.getElementById('viewModeLabel').innerText = "YEARLY PERFORMANCE";
                for (let yr = now.getFullYear() - 5; yr <= now.getFullYear() + 1; yr++) {
                    const opt = document.createElement('option'); opt.value = yr.toString(); opt.text = yr.toString();
                    if (yr.toString() === selectedYear) opt.selected = true; s.appendChild(opt);
                }
            }
        }

        function handleSelectorChange() {
            const v = document.getElementById('mainSelector').value;
            if (dashboardMode === 'monthly' || currentView !== 'dashboard') { selectedMonth = v; selectedYear = v.split('-')[0]; }
            else { selectedYear = v; selectedMonth = `${v}-01`; }
            updateStats(); renderCurrentView();
        }

        function updateStats(skipDownload = true) {
            let data = (dashboardMode === 'yearly' && currentView === 'dashboard') ? getYearlyAggregatedData(selectedYear) : (appData.months[selectedMonth] || defaultMonthData());
            const inc = (data.income.salary || 0) + (data.income.credits || 0);
            let exp = 0, sip = 0;
            Object.entries(data.expenses || {}).forEach(([k, v]) => { if (k === "SIP") sip += (Number(v) || 0); else exp += (Number(v) || 0); });
            
            let wish = 0;
            if (appData.wishlist) {
                if (dashboardMode === 'yearly' && currentView === 'dashboard') { 
                    wish = appData.wishlist.filter(i => i.purchased && i.purchasedMonth && i.purchasedMonth.startsWith(selectedYear)).reduce((s, i) => s + (i.cost || 0), 0); 
                }
                else { 
                    wish = appData.wishlist.filter(i => i.purchased && i.purchasedMonth === selectedMonth).reduce((s, i) => s + (i.cost || 0), 0); 
                }
            }

            document.getElementById('statSaved').innerText = `₹${(inc - exp - sip - wish).toLocaleString()}`;
            document.getElementById('statInvested').innerText = `₹${sip.toLocaleString()}`;
            localStorage.setItem('finance_pro_data', JSON.stringify(appData));
            if (!skipDownload) autoSyncFile();
        }

        function getYearlyAggregatedData(y) {
            const agg = defaultMonthData();
            Object.keys(appData.months).forEach(m => {
                if (m.startsWith(y)) {
                    const d = appData.months[m];
                    agg.income.salary += (d.income.salary || 0); agg.income.credits += (d.income.credits || 0);
                    Object.keys(d.expenses).forEach(c => agg.expenses[c] = (agg.expenses[c] || 0) + (d.expenses[c] || 0));
                }
            });
            return agg;
        }

        function setView(v) {
            currentView = v; if (v !== 'dashboard') dashboardMode = 'monthly';
            const stats = document.getElementById('dashboard-stats');
            v === 'retirement' ? stats.classList.add('hidden') : stats.classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.id === `btn-${v}`) btn.className = 'nav-btn p-3 rounded-2xl neu-pressed text-indigo-400';
                else btn.className = 'nav-btn p-3 rounded-2xl neu-flat text-gray-500';
            });
            renderSelectorUI(); updateStats(); renderCurrentView();
        }

        function renderCurrentView() {
            const c = document.getElementById('contentArea');
            if (!c) return;
            const d = (dashboardMode === 'yearly' && currentView === 'dashboard') ? getYearlyAggregatedData(selectedYear) : (appData.months[selectedMonth] || defaultMonthData());
            if (currentView === 'dashboard') renderDashboardSummary(c, d);
            else if (currentView === 'entry') renderEntryForm(c, d);
            else if (currentView === 'wishlist') renderWishlistView(c);
            else if (currentView === 'retirement') renderRetirementView(c);
        }

        function renderDashboardSummary(container, data) {
            container.innerHTML = `<div class="space-y-8 animate-in fade-in duration-500">
                <div class="neu-pressed p-1.5 rounded-2xl flex gap-1">
                    <button onclick="toggleDashboardMode('monthly')" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${dashboardMode === 'monthly' ? 'bg-indigo-600 text-white shadow-lg' : 'text-gray-500'}">MONTHLY</button>
                    <button onclick="toggleDashboardMode('yearly')" class="flex-1 py-3 text-[10px] font-black rounded-xl transition-all ${dashboardMode === 'yearly' ? 'bg-indigo-600 text-white shadow-lg' : 'text-gray-500'}">YEARLY</button>
                </div>
                <div class="neu-flat rounded-[2rem] p-8 text-center border-t border-white/5"><h3 class="text-[10px] font-bold text-gray-500 mb-8 uppercase tracking-widest text-center">Expense Distribution</h3><div class="h-64 flex justify-center"><canvas id="expensePieChart"></canvas></div></div>
                <div class="neu-flat rounded-[2rem] p-8 text-center border-t border-white/5"><h3 class="text-[10px] font-bold text-gray-500 mb-8 uppercase tracking-widest text-center">Cashflow Trends</h3><div class="h-64 flex justify-center"><canvas id="cashflowBarChart"></canvas></div></div>
            </div>`;
            initCharts(data);
        }

        function toggleDashboardMode(m) { dashboardMode = m; renderSelectorUI(); updateStats(); renderCurrentView(); }

        function initCharts(data) {
            const ctxPie = document.getElementById('expensePieChart'), ctxBar = document.getElementById('cashflowBarChart');
            if (!ctxPie || !ctxBar) return;
            const labels = [], values = [];
            Object.entries(data.expenses || {}).forEach(([k, v]) => { if (v > 0) { labels.push(k); values.push(v); } });
            new Chart(ctxPie, { type: 'doughnut', data: { labels, datasets: [{ data: values, backgroundColor: ['#6366f1', '#f43f5e', '#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#ec4899'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, usePointStyle: true, font: { size: 9, weight: 'bold' } } } }, cutout: '78%' } });
            const inc = (data.income.salary || 0) + (data.income.credits || 0);
            let exp = 0, sip = 0; Object.entries(data.expenses || {}).forEach(([k,v]) => { if (k === "SIP") sip += v; else exp += v; });
            new Chart(ctxBar, { type: 'bar', data: { labels: ['Income', 'Expenses', 'SIP'], datasets: [{ data: [inc, exp, sip], backgroundColor: ['#10b981', '#f43f5e', '#3b82f6'], borderRadius: 12, barThickness: 24 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#27282d' }, ticks: { font: { size: 9 }, callback: v => '₹' + (v >= 100000 ? (v/100000).toFixed(1) + 'L' : v) } }, x: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' } } } }, plugins: { legend: { display: false } } } });
        }

        function renderEntryForm(container, data) {
            container.innerHTML = `<div class="space-y-8 animate-in slide-in-from-bottom duration-500">
                <div class="neu-flat rounded-[2rem] p-8 border-t border-white/5"><h3 class="text-indigo-400 text-sm font-black mb-8 uppercase tracking-widest text-center">Income Inputs</h3><div class="space-y-6">
                    <div><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Monthly Salary</label><input type="number" id="inp-salary" value="${data.income.salary || ''}" class="w-full text-xl font-bold neu-pressed rounded-2xl px-5 py-4 outline-none text-white text-center"></div>
                    <div><label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 block">Other Credits</label><input type="number" id="inp-credits" value="${data.income.credits || ''}" class="w-full text-xl font-bold neu-pressed rounded-2xl px-5 py-4 outline-none text-white text-center"></div>
                </div></div>
                <div class="neu-flat rounded-[2rem] p-8 border-t border-white/5">
                    <div class="flex justify-between items-center mb-8"><h3 class="text-red-400 text-sm font-black uppercase tracking-widest">Expense List</h3><button onclick="openCategoryModal()" class="text-[9px] neu-flat text-indigo-400 px-4 py-2 rounded-xl font-black uppercase">+ Field</button></div>
                    <div class="grid grid-cols-1 gap-6">
                        ${appData.categories.map(cat => `
                            <div class="flex items-center gap-4 group">
                                <div class="flex-grow">
                                    <label class="text-[10px] font-bold text-gray-500 uppercase truncate block mb-1 tracking-widest">${cat}</label>
                                    <input type="number" data-category="${cat}" value="${data.expenses[cat] || ''}" class="expense-input w-full neu-pressed rounded-xl px-4 py-3 outline-none text-gray-200 text-center">
                                </div>
                                ${cat !== 'SIP' ? `<button onclick="removeCategory('${cat}')" class="mt-5 p-2 text-gray-600 opacity-0 group-hover:opacity-100 transition-opacity"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path></svg></button>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
                <button onclick="saveData()" class="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase tracking-widest shadow-xl shadow-indigo-900/40 active:scale-95 transition-transform">Update Account Logs</button>
            </div>`;
        }

        function renderWishlistView(container) {
            container.innerHTML = `<div class="space-y-8 animate-in slide-in-from-bottom duration-500">
                <div class="neu-flat rounded-3xl p-6 border-l-4 border-amber-500 border-t border-white/5"><div class="flex gap-3"><input type="text" id="wish-name" placeholder="Item..." class="flex-grow neu-pressed rounded-xl px-4 py-3 outline-none text-white text-sm"><input type="number" id="wish-cost" placeholder="₹" class="w-24 neu-pressed rounded-xl px-4 py-3 outline-none text-white text-sm"><button onclick="addWishlistItem()" class="bg-indigo-600 text-white p-3 rounded-xl font-bold">+</button></div></div>
                <div class="space-y-5">${appData.wishlist.map((item, idx) => `<div class="neu-flat p-6 rounded-[2rem] border-t border-white/5 flex items-center justify-between group transition-all ${item.purchased ? 'opacity-40' : ''}"><div class="flex items-center gap-5"><input type="checkbox" ${item.purchased ? 'checked' : ''} onchange="toggleWishItem(${idx})"><div class=""><span class="block font-bold text-gray-100 ${item.purchased ? 'line-through text-gray-500' : ''}">${item.name}</span><span class="text-xs font-bold text-indigo-400">₹${(item.cost || 0).toLocaleString()}</span></div></div><button onclick="deleteWishItem(${idx})" class="text-red-500 p-2 font-black text-[9px] uppercase">Delete</button></div>`).join('')}</div>
            </div>`;
        }

        function renderRetirementView(container) {
            const prog = (appData.portfolioValue / appData.retirementGoal) * 100;
            const remaining = Math.max(0, appData.retirementGoal - appData.portfolioValue);
            container.innerHTML = `<div class="space-y-8 animate-in slide-in-from-bottom duration-500">
                <div class="neu-flat rounded-[2.5rem] p-10 text-center border-t border-white/5">
                    <h3 class="text-[10px] font-black text-gray-500 mb-4 uppercase tracking-[0.2em]">Retirement Target</h3>
                    <p class="text-4xl font-black text-indigo-400">₹${(appData.retirementGoal/10000000).toFixed(2)} Cr</p>
                    <div class="mt-12 neu-pressed h-6 rounded-full overflow-hidden relative">
                        <div class="progress-fill h-full bg-gradient-to-r from-indigo-600 to-indigo-400" style="width: ${Math.min(100, prog)}%"></div>
                    </div>
                    <p class="text-right text-[10px] font-black text-indigo-500 mt-4 tracking-widest">${prog.toFixed(2)}% ACHIEVED</p>
                    <p class="text-center text-[10px] text-gray-500 mt-2 uppercase font-bold tracking-widest">Gap: ₹${remaining.toLocaleString()}</p>
                </div>
                
                <div class="neu-flat rounded-[2.5rem] p-8 border-t border-white/5 space-y-8">
                    <div>
                        <label class="text-[10px] font-black text-gray-500 uppercase mb-4 block text-center tracking-widest">Update Portfolio Value</label>
                        <input type="number" id="inp-portfolio" value="${appData.portfolioValue || ''}" class="w-full text-2xl font-black neu-pressed rounded-2xl py-5 outline-none text-center text-white">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-gray-500 uppercase mb-4 block text-center tracking-widest text-indigo-400">Set Retirement Goal (Target)</label>
                        <input type="number" id="inp-goal" value="${appData.retirementGoal || ''}" class="w-full text-2xl font-black neu-pressed rounded-2xl py-5 outline-none text-center text-white">
                    </div>
                    <button onclick="updateRetirement()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg uppercase tracking-widest transition-transform active:scale-95">Confirm Target & Value</button>
                </div>
            </div>`;
        }

        function saveData() {
            if (!appData.months[selectedMonth]) appData.months[selectedMonth] = defaultMonthData();
            const m = appData.months[selectedMonth];
            m.income.salary = Number(document.getElementById('inp-salary').value);
            m.income.credits = Number(document.getElementById('inp-credits').value);
            document.querySelectorAll('.expense-input').forEach(i => m.expenses[i.getAttribute('data-category')] = Number(i.value) || 0);
            showToast("Account Data Saved"); 
            updateStats(false);
        }

        function updateRetirement() { 
            appData.portfolioValue = Number(document.getElementById('inp-portfolio').value) || 0; 
            appData.retirementGoal = Number(document.getElementById('inp-goal').value) || 40000000;
            localStorage.setItem('finance_pro_data', JSON.stringify(appData)); 
            renderRetirementView(document.getElementById('contentArea')); 
            showToast("Stats Synchronized"); 
            autoSyncFile(); 
        }

        function autoSyncFile() {
            try {
                const s = JSON.stringify(appData), b = new Blob([s], { type: 'application/json' }), u = URL.createObjectURL(b), a = document.createElement('a');
                a.href = u; a.style.display = 'none'; a.download = `hisabkitab_data.json`;
                document.body.appendChild(a); a.click();
                setTimeout(() => document.body.removeChild(a), 100);
            } catch (e) {}
        }

        function exportData() {
            const s = JSON.stringify(appData, null, 2), b = new Blob([s], { type: 'application/json' }), u = URL.createObjectURL(b), a = document.createElement('a');
            a.href = u; a.style.display = 'none'; a.download = `HK_Backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a); a.click();
            setTimeout(() => document.body.removeChild(a), 100);
            showToast("Manual Backup Created");
        }

        function triggerImport() { document.getElementById('importFile').click(); }
        function handleImport(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader(); r.onload = (event) => {
                try {
                    const d = JSON.parse(event.target.result);
                    if (d.categories && d.months) { appData = d; localStorage.setItem('finance_pro_data', JSON.stringify(appData)); location.reload(); }
                    else showToast("Invalid Data Format");
                } catch(e) { showToast("Sync Error"); }
            }; r.readAsText(f);
        }

        function openCategoryModal() { document.getElementById('categoryModal').classList.remove('hidden'); document.getElementById('newCategoryName').focus(); }
        function closeCategoryModal() { document.getElementById('categoryModal').classList.add('hidden'); document.getElementById('newCategoryName').value = ''; }
        function confirmAddCategory() {
            const n = document.getElementById('newCategoryName').value.trim();
            if (n && !appData.categories.includes(n)) { appData.categories.push(n); Object.values(appData.months).forEach(m => m.expenses[n] = 0); renderCurrentView(); closeCategoryModal(); updateStats(false); }
        }
        function removeCategory(c) {
            if (confirm(`Delete "${c}"? This will clear its data history.`)) { appData.categories = appData.categories.filter(x => x !== c); Object.values(appData.months).forEach(m => delete m.expenses[c]); renderCurrentView(); updateStats(false); }
        }
        function addWishlistItem() {
            const n = document.getElementById('wish-name').value, c = Number(document.getElementById('wish-cost').value);
            if (n && c) { appData.wishlist.unshift({ name: n, cost: c, purchased: false, purchasedMonth: null }); renderWishlistView(document.getElementById('contentArea')); updateStats(false); document.getElementById('wish-name').value = ''; document.getElementById('wish-cost').value = ''; }
        }
        function toggleWishItem(i) {
            const item = appData.wishlist[i]; item.purchased = !item.purchased; item.purchasedMonth = item.purchased ? selectedMonth : null;
            renderWishlistView(document.getElementById('contentArea')); updateStats(false);
        }
        function deleteWishItem(i) { appData.wishlist.splice(i, 1); renderWishlistView(document.getElementById('contentArea')); updateStats(false); }
        function showToast(m) { const t = document.getElementById('toast'); if (!t) return; t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }
    </script>
</body>
</html>
